<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aman Töleg - Final Luxury</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00873c;
            --dark-green: #004d26;
            --gold: #ffc107;
            --bg: #f0f4f2;
            --text: #111827;
            --glass: #ffffff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* TÄZE SPLASH SCREEN - LUXURY STYLE */
        #splash { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #004d26 0%, #001a0d 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10000; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .logo-container {
            width: 280px;
            margin-bottom: 25px;
            animation: zoomIn 1.2s ease-out;
        }

        .logo-img {
            width: 100%;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.4));
        }

        .slogan-box {
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s forwards 1s;
        }

        .main-slogan {
            color: var(--gold);
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 8px;
        }

        .sub-slogan {
            font-family: 'Dancing Script', cursive;
            color: #ffffff;
            font-size: 28px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        @keyframes zoomIn {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* JANLY ARKA FON */
        .bg-glow { position: fixed; width: 300px; height: 300px; background: var(--primary); filter: blur(100px); opacity: 0.15; z-index: -1; border-radius: 50%; animation: moveGlow 15s infinite alternate; }
        .glow-2 { background: var(--gold); right: -100px; top: 20%; animation-delay: -5s; }
        @keyframes moveGlow { 0% { transform: translate(0, 0); } 100% { transform: translate(100px, 150px); } }

        /* HEADER */
        .header { background: var(--dark-green); padding: 15px; position: sticky; top: 0; z-index: 1000; }
        .top-row { display: flex; justify-content: space-between; align-items: center; max-width: 500px; margin: auto; }
        
        /* BANK CARD */
        .main-page { max-width: 500px; margin: auto; padding: 20px; }
        .bank-card { background: linear-gradient(135deg, #004d26, #00873c); padding: 25px; border-radius: 25px; color: white; margin-bottom: 30px; box-shadow: 0 15px 35px rgba(0,135,60,0.3); position: relative; }

        /* MENU GRID */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .menu-item { 
            background: #ffffff; border-radius: 25px; text-align: center; 
            padding: 25px 10px; cursor: pointer; transition: 0.2s ease; 
            border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .menu-item:active { transform: scale(0.92); background-color: #f9f9f9; }
        .menu-item span { display: block; font-weight: 800; font-size: 17px; color: #004d26; margin-top: 10px; }
        
        /* 100=250 LOGIKA ÜÇIN INPUT WE BEÝLEKILERIŇ STILI... */
    </style>
</head>
<body onload="initApp()">

<div class="bg-glow"></div>
<div class="bg-glow glow-2"></div>

<div id="splash">
    <div class="logo-container">
        <img src="8994.png" alt="Aman Töleg" class="logo-img">
    </div>
    <div class="slogan-box">
        <div class="main-slogan">YNAMLY WE ÇALT TÖLEGLER</div>
        <div class="sub-slogan">Aman Töleg Siziň Bilen</div>
    </div>
</div>

<div class="header">
    <div class="top-row">
        <div style="color: white; font-weight: 900; font-size: 20px; letter-spacing: 1px;">AMAN TÖLEG</div>
        <div style="color: var(--gold); font-size: 20px;"><i class="fas fa-crown"></i></div>
    </div>
</div>

<div class="main-page">
    <div class="bank-card">
        <div style="display: flex; justify-content: space-between;">
            <div>
                <p style="font-size: 12px; opacity: 0.8; letter-spacing: 1px;">SÖWDA HASABY</p>
                <h2 style="font-size: 20px; margin-top: 5px;">AMAN HAYITMURADOV</h2>
            </div>
            <img src="8994.png" style="width: 50px; height: 50px; object-fit: contain; filter: brightness(0) invert(1);">
        </div>
        <div style="margin-top: 25px; font-size: 24px; font-weight: 900; letter-spacing: 2px;">
            **** **** **** 2026
        </div>
    </div>

    <div class="menu-grid">
        <div class="menu-item">
            <i class="fas fa-mobile-alt" style="font-size: 35px; color: var(--primary);"></i>
            <span>Tmcell</span>
        </div>
        <div class="menu-item">
            <i class="fas fa-wifi" style="font-size: 35px; color: var(--primary);"></i>
            <span>Internet</span>
        </div>
        </div>
</div>

<script>
    function initApp() {
        // Splash screen-i 3.5 sekuntdan soň aýyrmak
        setTimeout(() => {
            const splash = document.getElementById('splash');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
            }, 800);
        }, 3500);
    }
</script>

</body>
</html>
