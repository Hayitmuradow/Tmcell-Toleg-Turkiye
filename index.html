<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aman Töleg - Final Luxury</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00873c;
            --dark-green: #005a28;
            --gold: #ffc107;
            --bg: #f0f4f2;
            --text: #111827;
            --glass: #ffffff; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; position: relative; }

        /* JANLY ARKA FON */
        .bg-glow { position: fixed; width: 300px; height: 300px; background: var(--primary); filter: blur(100px); opacity: 0.15; z-index: -1; border-radius: 50%; animation: moveGlow 15s infinite alternate; }
        .glow-2 { background: var(--gold); right: -100px; top: 20%; animation-delay: -5s; }
        @keyframes moveGlow { 0% { transform: translate(0, 0); } 100% { transform: translate(100px, 150px); } }

        /* TÄZE PROFESSIONAL SPLASH (TÜRKMEN-TÜRK BAÝDAK RENKLERI) */
        #splash { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #004d26 0%, #00873c 45%, #e30a17 55%, #8b0000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10000; color: white; transition: 0.8s ease; 
        }
        .splash-content { text-align: center; animation: zoomIn 1.2s ease-out; }
        .splash-sub-text { font-family: 'Dancing Script', cursive; font-size: 32px; color: var(--gold); margin-top: 20px; opacity: 0; animation: fadeIn 1.5s forwards 1s; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* HEADER */
        .header { background: var(--dark-green); padding: 15px; position: sticky; top: 0; z-index: 1000; }
        .top-row { display: flex; justify-content: space-between; align-items: center; max-width: 500px; margin: auto; }

        /* MAIN PAGE */
        .main-page { max-width: 500px; margin: auto; padding: 20px; }
        .bank-card { background: linear-gradient(135deg, #004d26, #00873c); padding: 25px; border-radius: 25px; color: white; margin-bottom: 30px; box-shadow: 0 15px 35px rgba(0,135,60,0.3); position: relative; }

        /* MENU GRID */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .menu-item { 
            background: #ffffff; border-radius: 25px; text-align: center; 
            padding: 20px 10px; cursor: pointer; transition: 0.2s ease; 
            border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }
        .menu-item:active { transform: scale(0.92); background-color: #f9f9f9; }
        .menu-item img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 10px; }
        .menu-item span { display: block; font-weight: 800; font-size: 15px; color: #004d26; }
    </style>
</head>
<body onload="initApp()">

<div class="bg-glow"></div>
<div class="bg-glow glow-2"></div>

<div id="splash">
    <div class="splash-content">
        <img src="8994.png" alt="Aman Töleg" style="width: 250px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));">
        <div style="margin-top: 20px; font-weight: 900; letter-spacing: 2px; font-size: 20px;">YNAMLY WE ÇALT TÖLEGLER</div>
        <div class="splash-sub-text">Aman Töleg Siziň Bilen</div>
    </div>
</div>

<div class="header">
    <div class="top-row">
        <div style="color: white; font-weight: 900; font-size: 22px;">AMAN TÖLEG</div>
        <div style="color: var(--gold); font-size: 22px;"><i class="fas fa-crown"></i></div>
    </div>
</div>

<div class="main-page">
    <div class="bank-card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <p style="font-size: 12px; opacity: 0.9; letter-spacing: 1px;">SÖWDA HASABY</p>
                <h2 style="font-size: 20px; margin-top: 5px; text-transform: uppercase;">AMAN HAYITMURADOV</h2>
            </div>
            <img src="8994.png" style="width: 50px; filter: brightness(0) invert(1); opacity: 0.8;">
        </div>
        <div style="margin-top: 30px; font-size: 24px; font-weight: 700; letter-spacing: 4px;">**** **** **** 2026</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item">
            <img src="tmcell.png" alt="Tmcell">
            <span>Tmcell</span>
        </div>
        <div class="menu-item">
            <img src="belet.png" alt="Belet Film">
            <span>Belet Film</span>
        </div>
        <div class="menu-item">
            <img src="alemtv.png" alt="Alem TV">
            <span>Alem TV</span>
        </div>
        <div class="menu-item">
            <img src="wifi.png" alt="Wi-Fi">
            <span>Wi-Fi Internet</span>
        </div>
        <div class="menu-item">
            <img src="telecom.png" alt="Altyn Asyr">
            <span>Altyn Asyr</span>
        </div>
        <div class="menu-item">
            <img src="phone.png" alt="Öý Telefon">
            <span>Öý Telefon</span>
        </div>
    </div>
</div>

<script>
    function initApp() {
        setTimeout(() => {
            const sp = document.getElementById('splash');
            sp.style.opacity = '0';
            setTimeout(() => { sp.style.display = 'none'; }, 800);
        }, 3500);
    }
</script>

</body>
</html>
