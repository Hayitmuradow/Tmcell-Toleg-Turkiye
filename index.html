<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aman Töleg - Luxury Update</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00873c; --dark-green: #2e7d32; --gold: #ffc107; --bg: #f0f4f2; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #333; min-height: 100vh; overflow: hidden; }

        /* SPLASH (TURKMEN-TURK COLORS) */
        #splash { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(135deg, #004d26 0%, #00873c 45%, #e30a17 55%, #8b0000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; transition: 0.8s; 
        }
        .main-slogan { color: white; font-weight: 900; font-size: 22px; letter-spacing: 2px; text-align: center; }
        .sub-slogan { font-family: 'Dancing Script', cursive; font-size: 32px; color: var(--gold); margin-top: 15px; opacity: 0; animation: fadeIn 1.5s forwards 1s; }

        /* HEADER */
        .header { background: #1b5e20; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .main-page { padding: 15px; max-width: 500px; margin: auto; overflow-y: auto; height: calc(100vh - 60px); }
        
        /* BANK CARD (KIÇELDILDI) */
        .bank-card { background: var(--dark-green); padding: 15px; border-radius: 20px; color: white; box-shadow: 0 8px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .copy-box { cursor: pointer; padding: 5px; border-radius: 10px; transition: 0.2s; position: relative; }
        .copy-box:active { background: rgba(255,255,255,0.1); }

        /* MENU GRID */
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding-bottom: 50px; }
        .menu-item { background: white; border-radius: 25px; padding: 20px 10px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; }
        .menu-item img, .menu-item i { width: 55px; height: 55px; object-fit: contain; margin-bottom: 10px; display: inline-block; }
        .menu-item i { font-size: 50px; color: var(--primary); line-height: 55px; }
        .menu-item span { display: block; font-weight: 700; color: #1b5e20; font-size: 14px; }

        /* TOAST */
        #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 25px; border-radius: 50px; display: none; z-index: 20000; }
        
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="initApp()">

<div id="splash">
    <div class="main-slogan">YNAMLY WE ÇALT TÖLEGLER</div>
    <div class="sub-slogan">Aman Töleg Siziň Bilen</div>
</div>

<div class="header">
    <div style="color: white; font-weight: 900; font-size: 20px;">AMAN TÖLEG</div>
    <div style="color: var(--gold); font-size: 20px;"><i class="fas fa-crown"></i></div>
</div>

<div class="main-page">
    <div class="bank-card">
        <div class="copy-box" onclick="copyData('AMAN HAYITMURADOV', 'Adyňyz nusgalandy!')">
            <p style="font-size: 10px; opacity: 0.8; letter-spacing: 1px;">SÖWDA HASABY</p>
            <h2 style="font-size: 18px; margin-top: 3px;">AMAN HAYITMURADOV <i class="fas fa-copy" style="font-size: 12px; opacity: 0.5;"></i></h2>
        </div>
        
        <div class="copy-box" onclick="copyData('TR91 0015 7000 0000 0201 1511 63', 'IBAN nusgalandy!')" style="margin-top: 12px; background: rgba(0,0,0,0.1); padding: 8px; border-radius: 12px;">
            <p style="font-size: 9px; opacity: 0.8;">IBAN BELGI:</p>
            <p style="font-size: 13px; font-weight: 700; word-break: break-all;">TR91 0015 7000 0000 0201 1511 63 <i class="fas fa-copy" style="font-size: 11px; opacity: 0.5;"></i></p>
        </div>
    </div>

    <div class="menu-grid">
        <div class="menu-item"><img src="tmcell.png"><span>Tmcell</span></div>
        <div class="menu-item"><img src="belet.png"><span>Belet Film</span></div>
        <div class="menu-item"><img src="alemtv.png"><span>Alem TV</span></div>
        <div class="menu-item"><img src="wifi.png"><span>Wi-Fi Internet</span></div>
        <div class="menu-item"><img src="phone.png"><span>Öý Telefon</span></div>
        <div class="menu-item" onclick="location.reload()"><i class="fas fa-sync-alt"></i><span>Refresh</span></div>
    </div>
</div>

<div id="toast">Nusgalandy!</div>

<script>
    function initApp() {
        if (!navigator.onLine) {
            alert("Internet ýok! Programma internetsiz işlemeýär.");
            window.stop();
            return;
        }
        setTimeout(() => {
            const sp = document.getElementById('splash');
            sp.style.opacity = '0';
            setTimeout(() => { sp.style.display = 'none'; document.body.style.overflow="auto"; }, 800);
        }, 3000);
    }

    function copyData(text, msg) {
        navigator.clipboard.writeText(text);
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 2000);
    }
</script>

</body>
</html>
