<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aman Töleg</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* ASYL DIZAYNYŇ ÜÇIN STIL (HIÇ ZAT ÜÝTGEDILMEDI) */
        :root {
            --primary: #00873c;
            --dark-green: #004d26;
            --gold: #ffc107;
            --bg: #f0f4f2;
            --text: #111827;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* TÄZE SPLASH SCREEN (DIŇE ŞU GOŞULDY) */
        #splash { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, #004d26 0%, #001a0d 100%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10000; transition: 0.8s ease; 
        }
        .logo-container { width: 250px; margin-bottom: 20px; animation: zoomIn 1s ease-out; }
        .logo-img { width: 100%; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3)); }
        .slogan-box { text-align: center; opacity: 0; animation: fadeIn 1s forwards 0.8s; }
        .main-slogan { color: var(--gold); font-size: 18px; font-weight: 900; letter-spacing: 2px; }
        .sub-slogan { font-family: 'Dancing Script', cursive; color: #ffffff; font-size: 24px; margin-top: 5px; }

        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { to { opacity: 1; } }

        /* ESASY SAHYPA DIZAYNY (SKRINŞOTDAKY ÝALY) */
        .header { background: var(--dark-green); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .main-page { padding: 20px; max-width: 500px; margin: auto; }
        .bank-card { 
            background: #2e7d32; padding: 25px; border-radius: 25px; color: white; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 30px; 
        }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-item { 
            background: white; border-radius: 25px; padding: 30px 10px; 
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .menu-item i { font-size: 40px; color: var(--primary); margin-bottom: 10px; display: block; }
        .menu-item span { font-weight: 700; font-size: 16px; color: #333; }
    </style>
</head>
<body onload="initApp()">

<div id="splash">
    <div class="logo-container">
        <img src="8994.png" alt="Aman Töleg" class="logo-img">
    </div>
    <div class="slogan-box">
        <div class="main-slogan">YNAMLY WE ÇALT TÖLEGLER</div>
        <div class="sub-slogan">Aman Töleg Siziň Bilen</div>
    </div>
</div>

<div class="header">
    <div style="color: white; font-weight: 900; font-size: 22px;">AMAN TÖLEG</div>
    <div style="color: var(--gold); font-size: 22px;"><i class="fas fa-crown"></i></div>
</div>

<div class="main-page">
    <div class="bank-card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <p style="font-size: 12px; opacity: 0.9;">SÖWDA HASABY</p>
                <h2 style="font-size: 20px; margin-top: 5px; text-transform: uppercase;">AMAN HAYITMURADOV</h2>
            </div>
            <img src="8994.png" style="width: 55px; opacity: 0.8;">
        </div>
        <div style="margin-top: 30px; font-size: 24px; font-weight: 700; letter-spacing: 3px;">
            **** **** **** 2026
        </div>
    </div>

    <div class="menu-grid">
        <div class="menu-item">
            <i class="fas fa-mobile-alt"></i>
            <span>Tmcell</span>
        </div>
        <div class="menu-item">
            <i class="fas fa-wifi"></i>
            <span>Internet</span>
        </div>
    </div>
</div>

<script>
    function initApp() {
        // Splash screen 3 sekuntdan soň ýitýär
        setTimeout(() => {
            const sp = document.getElementById('splash');
            sp.style.opacity = '0';
            setTimeout(() => { sp.style.display = 'none'; }, 800);
        }, 3000);
    }
</script>

</body>
</html>
