<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aman Töleg - Final Luxury</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00873c; --dark-green: #005a28; --gold: #ffc107; --bg: #f0f4f2; --text: #111827; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

        /* HEADER */
        .header { background: var(--dark-green); padding: 15px; color: white; text-align: center; }
        .header h1 { font-size: 20px; font-weight: 900; letter-spacing: 1px; }

        /* BANK CARD */
        .main-page { max-width: 500px; margin: auto; padding: 20px; }
        .bank-card { background: linear-gradient(135deg, #004d26, #00873c); padding: 25px; border-radius: 25px; color: white; margin-bottom: 30px; box-shadow: 0 15px 35px rgba(0,135,60,0.3); }
        .bank-card .name { font-size: 20px; font-weight: 900; margin-bottom: 15px; }
        .bank-card .iban { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 12px; font-size: 14px; font-weight: 700; }

        /* MENU GRID */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .menu-item { background: #ffffff; border-radius: 25px; text-align: center; padding: 25px 10px; cursor: pointer; transition: 0.2s; border: 1px solid rgba(0,0,0,0.05); }
        .menu-item:active { transform: scale(0.92); background-color: #f9f9f9; }
        .menu-item i { font-size: 35px; color: var(--primary); margin-bottom: 10px; display: block; }
        .menu-item span { font-weight: 800; font-size: 16px; color: #004d26; }

        /* OVERLAY */
        #payment-page { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; padding: 20px; }
        .payment-container { background: #ffffff; padding: 25px; border-radius: 30px; }
        input { width: 100%; padding: 18px; border-radius: 15px; border: 1.5px solid rgba(0,0,0,0.1); margin-bottom: 15px; font-weight: 700; font-size: 16px; }
        .send-btn { width: 100%; background: #25d366; color: white; border: none; padding: 20px; border-radius: 15px; font-weight: 900; font-size: 18px; }
    </style>
</head>
<body>

<div class="header">
    <h1>AMAN TÖLEG</h1>
</div>

<div class="main-page">
    <div class="bank-card">
        <div class="name">AMAN HAYITMURADOV</div>
        <div class="iban">TR91 0015 7000 0000 0201 1511 63</div>
    </div>

    <div class="menu-grid">
        <div class="menu-item" onclick="openPay('Tmcell')"><i class="fas fa-mobile-alt"></i><span>Tmcell</span></div>
        <div class="menu-item" onclick="openPay('Internet')"><i class="fas fa-wifi"></i><span>Internet</span></div>
        <div class="menu-item" onclick="openPay('Belet')"><i class="fas fa-play"></i><span>Belet Film</span></div>
        <div class="menu-item" onclick="openPay('Altyn Asyr')"><i class="fas fa-sim-card"></i><span>Altyn Asyr</span></div>
    </div>
</div>

<div id="payment-page">
    <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
        <h2 id="title" style="font-weight: 900;"></h2>
        <i class="fas fa-times" onclick="closePay()" style="font-size: 24px;"></i>
    </div>
    <input type="text" id="c-name" placeholder="Müşderiniň ady">
    <input type="tel" id="c-phone" value="+993" maxlength="13" onkeydown="checkKey(event)" oninput="checkInp(this)">
    <input type="number" id="c-amt" placeholder="Manat" oninput="calc()">
    <div id="res" style="text-align: center; font-weight: 900; font-size: 22px; margin-bottom: 20px;">0.00 TL</div>
    <button class="send-btn" onclick="send()">DEKONT IBERIŇ</button>
</div>

<script>
    let service = "";
    function openPay(s) { service = s; document.getElementById('title').innerText = s; document.getElementById('payment-page').style.display = 'block'; }
    function closePay() { document.getElementById('payment-page').style.display = 'none'; }
    
    function checkKey(e) { if ((e.key==="Backspace"||e.key==="Delete") && e.target.selectionStart <= 4) e.preventDefault(); }
    function checkInp(i) { if (!i.value.startsWith('+993')) i.value = '+993'; }
    
    function calc() {
        let m = document.getElementById('c-amt').value;
        document.getElementById('res').innerText = (m * 2.5).toFixed(2) + " TL";
    }

    function send() {
        let n = document.getElementById('c-name').value;
        let p = document.getElementById('c-phone').value;
        let a = document.getElementById('c-amt').value;
        if(!n || !a) return alert("Maglumatlary giriziň!");
        let txt = `📄 *AMAN TÖLEG*%0A👤 *Müşderi:* ${n}%0A📞 *Tel:* ${p}%0A🛠 *Hyzmat:* ${service}%0A💰 *Mukdar:* ${a} Manat (${(a*2.5).toFixed(2)} TL)`;
        window.open(`https://wa.me/99364041065?text=${txt}`, '_blank');
    }
</script>

</body>
</html>
