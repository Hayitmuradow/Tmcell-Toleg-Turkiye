<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aman Töleg</title>
    <style>
        :root { --primary: #097133; --bg: #f8f9fa; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); }

        /* SPLASH EKRAN - TÜRKMEN & TÜRK BAÝDAK REŇKLERI */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #097133 0%, #097133 50%, #e30a17 50%, #e30a17 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999;
            color: white; text-align: center;
        }
        
        /* ÖÇÜP-ÝANYP DURAN BIR SETIRLI ÝAZGY */
        .splash-title {
            font-size: 28px; font-weight: 900; letter-spacing: 1px;
            animation: blink 1.5s infinite alternate;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        @keyframes blink {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.4; transform: scale(0.95); }
        }

        /* CONTENT */
        .header { padding: 15px; background: white; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { background: var(--primary); color: white; padding: 5px 10px; border-radius: 8px; font-weight: bold; }
        
        .welcome { padding: 20px; }
        .welcome h2 { font-size: 24px; color: #111; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .card { 
            background: white; border-radius: 15px; padding: 20px 10px; text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05); border: 1px solid #eee;
        }
        
        /* GITHUB SURATLARY ÜÇIN STIL */
        .card img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 10px; }
        
        .card h3 { font-size: 14px; font-weight: bold; color: #333; }
        .card p { font-size: 12px; color: #888; margin-top: 4px; }

        .refresh-btn {
            display: block; width: 90%; margin: 20px auto; padding: 15px;
            background: white; border: 1px solid #ddd; border-radius: 12px;
            text-align: center; font-weight: bold; color: var(--primary); text-decoration: none;
        }
    </style>
</head>
<body>

<div id="splash">
    <div class="splash-title">AMAN TÖLEG Siziň Bilen</div>
</div>

<div class="header">
    <div class="logo">T</div>
    <h1 style="font-size: 18px;">AMAN TÖLEG</h1>
</div>

<div class="welcome">
    <h2>Hoş geldiňiz!</h2>
    <p style="color: #666;">Bugün haýsy hyzmat üçin töleg edýäris?</p>
</div>

<div class="grid">
    <div class="card">
        <img src="https://raw.githubusercontent.com/Hayitmuradow/Tmcell-Toleg-Turkiye/main/tmcell.png" alt="Tmcell">
        <h3>Tmcell</h3>
        <p>Altyn Asyr</p>
    </div>

    <div class="card">
        <img src="https://raw.githubusercontent.com/Hayitmuradow/Tmcell-Toleg-Turkiye/main/wifi.png" alt="Wi-Fi">
        <h3>Wi-Fi</h3>
        <p>Belet Internet</p>
    </div>

    <div class="card">
        <img src="https://raw.githubusercontent.com/Hayitmuradow/Tmcell-Toleg-Turkiye/main/alemtv.png" alt="Alem TV">
        <h3>Alem TV</h3>
        <p>Teleýaýlym</p>
    </div>

    <div class="card">
        <img src="https://raw.githubusercontent.com/Hayitmuradow/Tmcell-Toleg-Turkiye/main/belet.png" alt="Belet Film">
        <h3>Belet Film</h3>
        <p>Kinoteatr</p>
    </div>

    <div class="card">
        <img src="https://raw.githubusercontent.com/Hayitmuradow/Tmcell-Toleg-Turkiye/main/phone.png" alt="Altyn Asyr">
        <h3>Altyn Asyr</h3>
        <p>Bank kartlary</p>
    </div>

    <div class="card">
        <img src="https://raw.githubusercontent.com/Hayitmuradow/Tmcell-Toleg-Turkiye/main/phone.png" alt="Öý Telefon">
        <h3>Öý Telefon</h3>
        <p>AŞTU / Telekom</p>
    </div>
</div>

<a href="#" class="refresh-btn" onclick="location.reload()">🔄 TÄZELE (REFRESH)</a>

<script>
    window.onload = function() {
        setTimeout(function() {
            var s = document.getElementById('splash');
            s.style.opacity = '0';
            setTimeout(function() { s.style.display = 'none'; }, 600);
        }, 2500);
    };
</script>

</body>
</html>
